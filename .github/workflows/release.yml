name: Release

# Publishes to PyPI via trusted publishing (OIDC) when a version tag is pushed.
# One-time setup on pypi.org: project "e2am" -> Publishing -> add GitHub
# publisher (owner: Shanmuk4622, repo: e2am, workflow: release.yml,
# environment: pypi).

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist and wheel
        run: |
          pip install build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Install the built wheel and smoke-test it
        run: |
          pip install dist/*.whl
          python -c "import e2am; print(e2am.__version__)"
          e2am version
          e2am hardware --json > /dev/null

  publish:
    runs-on: ubuntu-latest
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
